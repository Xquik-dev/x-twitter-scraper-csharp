name: Publish to NuGet

permissions: {}

concurrency:
  group: nuget-publish
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths:
      - ".release-please-manifest.json"
  workflow_dispatch:
    inputs:
      release_ref:
        description: Exact release tag to publish
        required: true
        type: string

jobs:
  prepare:
    name: Prepare Draft Release
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: write # Dispatch the tag-bound publisher.
      contents: write # Create the exact release tag.
    steps:
      - name: Check out release commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare immutable draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          version="$(jq -er '."."' .release-please-manifest.json)"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]
          release_tag="v${version}"
          release_json=""

          for _ in {1..30}; do
            if release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${release_tag}" 2>/dev/null)"; then
              break
            fi
            sleep 10
          done

          test -n "$release_json"
          test "$(jq -r '.draft' <<<"$release_json")" = "true"
          test "$(jq -r '.target_commitish' <<<"$release_json")" = "$GITHUB_SHA"

          if remote_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${release_tag}" --jq '.object.sha' 2>/dev/null)"; then
            test "$remote_sha" = "$GITHUB_SHA"
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${release_tag}" \
              -f sha="$GITHUB_SHA" >/dev/null
          fi

          gh workflow run publish-nuget.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$release_tag" \
            -f release_ref="$release_tag"

  publish:
    name: Build & Publish Package
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: nuget
    outputs:
      package_version: ${{ steps.release.outputs.package_version }}
      release_tag: ${{ steps.release.outputs.release_tag }}
    permissions:
      attestations: write # Required to publish SLSA provenance.
      contents: read
      id-token: write # Required for GitHub and NuGet keyless signing.
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.release_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release tag
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_ref }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF_TYPE" != "tag" || "$RELEASE_TAG" != "$GITHUB_REF_NAME" ]]; then
            echo "Run this workflow from the matching release tag." >&2
            exit 1
          fi
          package_version="${RELEASE_TAG#v}"
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.+-]+)?$ ]]; then
            echo "Release tag must contain a valid v-prefixed package version." >&2
            exit 1
          fi
          version="$(jq -er '."."' .release-please-manifest.json)"
          test "$RELEASE_TAG" = "v${version}"
          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")"
          test "$(jq -r '.draft' <<<"$release_json")" = "true"
          test "$(jq -r '.target_commitish' <<<"$release_json")" = "$GITHUB_SHA"
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$GITHUB_SHA"
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.301"

      - name: Restore locked dependencies
        run: ./scripts/bootstrap

      - name: Audit dependencies and package reproducibility
        run: |
          ./scripts/audit
          ./scripts/check-reproducible

      - name: Build normalized packages
        run: ./scripts/build-package artifacts/packages

      - name: Validate release packages
        env:
          PACKAGE_VERSION: ${{ steps.release.outputs.package_version }}
        run: |
          for package in \
            "artifacts/packages/XTwitterScraper.$PACKAGE_VERSION.nupkg" \
            "artifacts/packages/XTwitterScraper.$PACKAGE_VERSION.symbols.nupkg"; do
            if [[ ! -f "$package" ]]; then
              echo "Expected release package is missing: $package" >&2
              exit 1
            fi
          done

      - name: Attest normalized packages
        id: attest
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: artifacts/packages/XTwitterScraper.${{ steps.release.outputs.package_version }}.nupkg

      - name: Stage attestation bundle
        env:
          ATTESTATION_BUNDLE: ${{ steps.attest.outputs.bundle-path }}
          PACKAGE_VERSION: ${{ steps.release.outputs.package_version }}
        run: |
          cp -- \
            "$ATTESTATION_BUNDLE" \
            "artifacts/packages/XTwitterScraper.$PACKAGE_VERSION.sigstore.json"

      - name: Preserve attested release files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nuget-release-${{ steps.release.outputs.package_version }}
          path: |
            artifacts/packages/XTwitterScraper.${{ steps.release.outputs.package_version }}.nupkg
            artifacts/packages/XTwitterScraper.${{ steps.release.outputs.package_version }}.sigstore.json
          if-no-files-found: error
          retention-days: 1

      - name: Request Short-Lived NuGet Key
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: burakbayir

      - name: Publish Package
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          PACKAGE_VERSION: ${{ steps.release.outputs.package_version }}
        run: |
          dotnet nuget push \
            "artifacts/packages/XTwitterScraper.$PACKAGE_VERSION.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate \
            --source https://api.nuget.org/v3/index.json

  attach:
    name: Attach Attested Release Files
    needs: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read # Required to download this run's release artifact.
      contents: write # Required to attach files to the matching release.
    steps:
      - name: Download attested release files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nuget-release-${{ needs.publish.outputs.package_version }}
          path: release-assets

      - name: Attach files to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_VERSION: ${{ needs.publish.outputs.package_version }}
          RELEASE_TAG: ${{ needs.publish.outputs.release_tag }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "release-assets/XTwitterScraper.$PACKAGE_VERSION.nupkg" \
            "release-assets/XTwitterScraper.$PACKAGE_VERSION.sigstore.json" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
          gh release edit "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false \
            --latest \
            --verify-tag
