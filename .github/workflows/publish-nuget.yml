name: Publish to NuGet

permissions: {}

concurrency:
  group: nuget-publish-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    name: Build & Publish Package
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: nuget
    outputs:
      package_version: ${{ steps.release.outputs.package_version }}
      release_tag: ${{ steps.release.outputs.release_tag }}
    permissions:
      attestations: write # Required to publish SLSA provenance.
      contents: read
      id-token: write # Required for GitHub and NuGet keyless signing.
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Validate release tag
        id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          if [[ "$GITHUB_REF_TYPE" != "tag" || "$RELEASE_TAG" != "$GITHUB_REF_NAME" ]]; then
            echo "Run this workflow from the matching release tag." >&2
            exit 1
          fi
          package_version="${RELEASE_TAG#v}"
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.+-]+)?$ ]]; then
            echo "Release tag must contain a valid v-prefixed package version." >&2
            exit 1
          fi
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.301"

      - name: Restore locked dependencies
        run: ./scripts/bootstrap

      - name: Audit dependencies and package reproducibility
        run: |
          ./scripts/audit
          ./scripts/check-reproducible

      - name: Build normalized packages
        run: ./scripts/build-package artifacts/packages

      - name: Validate release packages
        env:
          PACKAGE_VERSION: ${{ steps.release.outputs.package_version }}
        run: |
          for package in \
            "artifacts/packages/XTwitterScraper.$PACKAGE_VERSION.nupkg" \
            "artifacts/packages/XTwitterScraper.$PACKAGE_VERSION.symbols.nupkg"; do
            if [[ ! -f "$package" ]]; then
              echo "Expected release package is missing: $package" >&2
              exit 1
            fi
          done

      - name: Attest normalized packages
        id: attest
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: artifacts/packages/XTwitterScraper.${{ steps.release.outputs.package_version }}.nupkg

      - name: Stage attestation bundle
        env:
          ATTESTATION_BUNDLE: ${{ steps.attest.outputs.bundle-path }}
          PACKAGE_VERSION: ${{ steps.release.outputs.package_version }}
        run: |
          cp -- \
            "$ATTESTATION_BUNDLE" \
            "artifacts/packages/XTwitterScraper.$PACKAGE_VERSION.sigstore.json"

      - name: Preserve attested release files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nuget-release-${{ steps.release.outputs.package_version }}
          path: |
            artifacts/packages/XTwitterScraper.${{ steps.release.outputs.package_version }}.nupkg
            artifacts/packages/XTwitterScraper.${{ steps.release.outputs.package_version }}.sigstore.json
          if-no-files-found: error
          retention-days: 1

      - name: Request Short-Lived NuGet Key
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: burakbayir

      - name: Publish Package
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          PACKAGE_VERSION: ${{ steps.release.outputs.package_version }}
        run: |
          dotnet nuget push \
            "artifacts/packages/XTwitterScraper.$PACKAGE_VERSION.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate \
            --source https://api.nuget.org/v3/index.json

  attach:
    name: Attach Attested Release Files
    needs: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read # Required to download this run's release artifact.
      contents: write # Required to attach files to the matching release.
    steps:
      - name: Download attested release files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nuget-release-${{ needs.publish.outputs.package_version }}
          path: release-assets

      - name: Attach files to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_VERSION: ${{ needs.publish.outputs.package_version }}
          RELEASE_TAG: ${{ needs.publish.outputs.release_tag }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "release-assets/XTwitterScraper.$PACKAGE_VERSION.nupkg" \
            "release-assets/XTwitterScraper.$PACKAGE_VERSION.sigstore.json" \
            --repo "$GITHUB_REPOSITORY"
