name: Publish to NuGet

permissions: {}

concurrency:
  group: nuget-publish-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    name: Build & Publish Package
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: nuget
    permissions:
      contents: read
      id-token: write # Required to exchange GitHub OIDC for a short-lived NuGet key.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          persist-credentials: false

      - name: Set Up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.x"

      - name: Restore Dependencies
        run: >-
          dotnet restore src/XTwitterScraper/XTwitterScraper.csproj
          --locked-mode

      - name: Build Package
        run: >-
          dotnet pack src/XTwitterScraper/XTwitterScraper.csproj
          --configuration Release
          --no-restore
          --output artifacts/packages

      - name: Request Short-Lived NuGet Key
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: burakbayir

      - name: Publish Package
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          mapfile -t packages < <(find artifacts/packages -maxdepth 1 -type f -name '*.nupkg' ! -name '*.symbols.nupkg' -print)
          if [ "${#packages[@]}" -ne 1 ]; then
            echo "Expected exactly 1 package, found ${#packages[@]}." >&2
            exit 1
          fi
          dotnet nuget push "${packages[0]}" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json
