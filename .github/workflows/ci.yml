name: CI

permissions:
  contents: read

concurrency:
  group: csharp-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - "**"
      - "!integrated/**"
      - "!stl-preview-head/**"
      - "!stl-preview-base/**"
      - "!generated"
      - "!codegen/**"
      - "codegen/stl/**"
  pull_request:
    branches-ignore:
      - "stl-preview-head/**"
      - "stl-preview-base/**"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check Out Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set Up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.x"

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Run Lints
        run: ./scripts/lint

  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check Out Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set Up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.x"

      - name: Build SDK
        run: ./scripts/build

  test:
    name: Test
    runs-on: windows-2025
    timeout-minutes: 10
    steps:
      - name: Check Out Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set Up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.x"

      - name: Run Tests
        run: ./scripts/test
        shell: bash
