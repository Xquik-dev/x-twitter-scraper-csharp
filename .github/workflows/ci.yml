name: CI

permissions:
  contents: read

concurrency:
  group: csharp-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - "**"
      - "!integrated/**"
      - "!stl-preview-head/**"
      - "!stl-preview-base/**"
      - "!generated"
      - "!codegen/**"
      - "codegen/stl/**"
  pull_request:
    branches-ignore:
      - "stl-preview-head/**"
      - "stl-preview-base/**"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check Out Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set Up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Run Lints
        run: ./scripts/lint

  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check Out Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set Up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"

      - name: Build SDK
        run: ./scripts/build

  test:
    name: Test
    runs-on: windows-2025
    timeout-minutes: 10
    steps:
      - name: Check Out Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set Up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"

      - name: Run Tests
        run: ./scripts/test
        shell: bash
